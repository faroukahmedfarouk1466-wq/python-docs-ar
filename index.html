<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="An offline-capable PWA">
  <meta name="theme-color" content="#2196F3">
  
  <link rel="manifest" href="/manifest.json">
  <!-- <link rel="icon" type="image/png" href="/images/icon-192x192.png"> -->
  <!-- <link rel="stylesheet" href="/styles.css"> -->
  <title>Offline App</title>
</head>
<body>

  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

header {
  background: #2196F3;
  color: white;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#status {
  padding: 5px 10px;
  border-radius: 5px;
  background: rgba(255,255,255,0.2);
}

main {
  padding: 20px;
  max-width: 600px;
  margin: 0 auto;
}

input, button {
  padding: 10px;
  margin: 10px 0;
  font-size: 16px;
}

button {
  background: #2196F3;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

button:active {
  background: #1976D2;
}

ul {
  list-style: none;
  margin-top: 20px;
}

li {
  background: white;
  padding: 15px;
  margin: 10px 0;
  border-radius: 5px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

  </style>

  <header>
    <h1>My Offline PWA</h1>
    <span id="status">Online</span>
  </header>
  
  <main>
    <input type="text" id="taskInput" placeholder="Add a task...">
    <button id="addBtn">Add Task</button>
    
    <ul id="taskList"></ul>
  </main>
  
  <script src="/app.js"></script>
</body>
</html>
